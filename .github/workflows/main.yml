---
name: Auto-generate singbox rule_set binary
on:
  push:
    branches: [master]
    paths: [.github/workflows/**, '**.sh']
  schedule:
    - cron: 0 * * * *
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Generate singbox rule_set source
        shell: bash
        run: |
          chmod +x makefile.sh
          bash ./makefile.sh
      - name: Generate singbox rule_set binary
        shell: bash
        run: |
          chmod +x get_singbox.sh
          bash ./get_singbox.sh
      - name: Generate date
        run: echo "DATE=$(TZ='Asia/Ho_Chi_Minh' date +"%Y.%m.%d-%H.%M.%S")" >> $GITHUB_ENV
      - name: Commit singbox rule_set
        uses: EndBug/add-and-commit@v9
        with:
          add: |
            - option/hostsVN-singbox-rule.json
            - option/hostsVN-singbox-rule.srs
            - option/hostsVN-clash-rule.yaml
          default_author: github_actor
          message: 'Cập nhật singbox rule_set: ${{ env.DATE }}'
          push: true
      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 2
