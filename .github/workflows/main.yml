---
name: Auto-generate singbox rule_set binary
on:
  push:
    branches: [main]
    paths: [.github/workflows/**]
  schedule:
    - cron: 0 * * * *
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: stable
      - name: Generate singbox rule_set source
        shell: bash
        run: |
          chmod +x makefile.sh
          bash ./makefile.sh
      - name: Install singbox
        shell: bash
        run: |
          curl -SsLO https://github.com/SagerNet/sing-box/releases/download/v1.8.0-beta.6/sing-box-1.8.0-beta.6-linux-amd64.tar.gz
          chmod +x sing-box-1.8.0-beta.6-linux-amd64.tar.gz
          tar -xvzf sing-box-1.8.0-beta.6-linux-amd64.tar.gz
      - name: Generate singbox rule_set binary
        shell: bash
        run: |
          chmod +x sing-box-1.8.0-beta.6-linux-amd64/sing-box
          ./sing-box-1.8.0-beta.6-linux-amd64/sing-box rule-set compile --output option/hostsVN-singbox-rule.srs option/hostsVN-singbox-rule.json
      - name: Generate date
        run: echo "DATE=$(TZ='Asia/Ho_Chi_Minh' date +"%Y.%m.%d-%H.%M.%S")" >> $GITHUB_ENV
      - name: Commit singbox rule_set
        uses: EndBug/add-and-commit@v9.1.1
        with:
          add: option/hostsVN-singbox-rule.srs
          default_author: github_actor
          message: 'Cập nhật singbox rule_set: ${{ env.DATE }}'
          push: true
      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 4
